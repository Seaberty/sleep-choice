name: Continuous Sleep Audit

on:
    schedule:
        - cron: "0 */6 * * *" # 每 6 小时自动运行
    workflow_dispatch: # 支持手动触发

jobs:
    audit_and_deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install Dependencies
              run: pip install requests beautifulsoup4

            - name: Run Audit Crawler
              run: python scripts/audit_crawler.py
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

            - name: Commit and Push (Silent)
              # 这一步只负责同步数据，即使 Push 失败或被 Vercel 拦截也不影响后续打包
              run: |
                  git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add data/registry.json
                  git commit -m "System: Auto-update pricing data" || exit 0
                  git push

            - name: Force Trigger Vercel Build
              # 关键修复：通过 Deploy Hook 强制部署。这种方式不看 Commit 是否 Verified。
              # 哪怕 GitHub Actions 没推送新代码，Vercel 也会重新打包。
              run: |
                  echo "Sending Force-Build Signal to Vercel..."
                  curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"