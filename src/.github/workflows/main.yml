name: Continuous Sleep Audit

on:
    schedule:
        - cron: "0 */6 * * *" # 每 6 小时自动运行
    workflow_dispatch: # 支持手动触发

jobs:
    audit_and_deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install Dependencies
              run: pip install requests beautifulsoup4

            - name: Run Audit Crawler
              run: python scripts/audit_crawler.py
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

            - name: Sync Data to GitHub
              # 私有仓库环境下，这一步可能会因为身份问题在 Vercel 侧显示 Canceled
              # 但没关系，它能把数据存进 GitHub 仓库就行
              run: |
                  git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add data/registry.json
                  git commit -m "System: Sync latest data" || exit 0
                  git push

            - name: Force Vercel Build Entire Project
              # 这是核心：通过 Deploy Hook 触发部署
              # 这种方式会强制 Vercel 以“项目所有者”身份重新拉取代码并打包
              run: |
                  echo "Triggering complete project rebuild..."
                  curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
