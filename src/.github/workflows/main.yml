name: Continuous Sleep Audit

on:
    schedule:
        - cron: "0 */6 * * *" # 每 6 小时自动运行
    workflow_dispatch: # 支持手动触发

jobs:
    audit_and_deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install Dependencies
              run: pip install requests beautifulsoup4

            - name: Run Audit Crawler
              run: python scripts/audit_crawler.py
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

            - name: Commit and Push if Registry Changed
              run: |
                  git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add data/registry.json
                  # 如果没有变化就退出，不报错
                  git commit -m "System: Auto-update pricing and biometric logs" || exit 0
                  git push

            - name: Trigger Vercel Deploy via Hook
              # 无论是否有新的 Commit 推送，都可以手动通过 Hook 触发部署
              # 或者你可以加一个条件判断
              run: |
                  curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
