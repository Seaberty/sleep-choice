name: Continuous Sleep Audit

on:
    schedule:
        - cron: "0 */6 * * *" # 每 6 小时自动运行
    workflow_dispatch: # 支持手动触发

jobs:
    audit_and_deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install Dependencies
              run: pip install requests beautifulsoup4

            - name: Run Audit Crawler
              run: python scripts/audit_crawler.py
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

            - name: Commit and Push (If Data Changed)
              # 这一步负责更新数据仓库。如果没变化，它会静默跳过，不影响后续部署。
              run: |
                  git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add data/registry.json
                  if git commit -m "System: Auto-update pricing and biometric logs"; then
                    git push
                    echo "Data updated and pushed to GitHub."
                  else
                    echo "No changes in data. Skipping push."
                  fi

            - name: Force Trigger Vercel Deploy
              # 核心修复：无论上面的 Git Push 是否执行，这一步都会强制 Vercel 重新打包部署
              # 这样就解决了“数据没变就不部署”和“unverified commit”的问题
              run: |
                  echo "Sending deployment signal to Vercel..."
                  curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
