# Weekly promo bundle + Pinterest PNGs + Reddit drafts (artifacts for download).
# Does not post to external APIs — human uploads / review recommended.
# Cron 0 1 * * 1 (UTC) = 每周一北京时间 09:00
name: Promo assets export

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/scripts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ github.workspace }}/requirements.txt

      - name: Run promo_assets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: python promo_assets.py --output-dir ./promo_output

      - uses: actions/upload-artifact@v4
        with:
          name: promo-assets
          path: src/scripts/promo_output/
          retention-days: 14
