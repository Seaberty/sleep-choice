# Submit static + registry / compare / guides URLs to IndexNow after daily catalog sync.
# Requires INDEXNOW_KEY secret and public/{key}.txt deployed on production.
name: IndexNow ping

on:
  schedule:
    # 1h after batch-scanner-daily (22:00 UTC) → 23:00 UTC
    - cron: "0 23 * * *"
  workflow_run:
    workflows: ["Batch scanner — daily incremental"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: indexnow-ping-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip when batch scanner was cancelled/skipped (workflow_run only)
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: src/scripts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ github.workspace }}/requirements.txt

      - name: Ping IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python indexnow_ping.py
